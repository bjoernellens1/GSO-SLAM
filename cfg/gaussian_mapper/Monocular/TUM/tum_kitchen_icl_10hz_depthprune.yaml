%YAML:1.0

#--------------------------------------------------------------------------------------------
# SLAM Parameters
#--------------------------------------------------------------------------------------------

SLAM.which_dataset: 1 # 0: replica, 1: tum
SLAM.sensor_type: rgbd
SLAM.image_width: 1280
SLAM.image_height: 720
SLAM.distortion_k1: 0.07101956754922867
SLAM.distortion_k2: -0.09848150610923767
SLAM.distortion_p1: 0.00043707378790713847
SLAM.distortion_p2: 0.0001285719481529668
SLAM.distortion_k3: 0.039714131504297256
SLAM.depth_scale: 1000
Mapper.fx: 749.8203735351562
Mapper.fy: 749.7190551757812
Mapper.cx: 640.7588500976562
Mapper.cy: 364.8509216308594

#--------------------------------------------------------------------------------------------
# Model Parameters
#--------------------------------------------------------------------------------------------

Model.sh_degree: 0
Model.resolution: -1.0
Model.white_background: 0
Model.eval: 0

#--------------------------------------------------------------------------------------------
# Pipeline Parameters
#--------------------------------------------------------------------------------------------

Camera.z_near: 0.01
Camera.z_far: 100.0
Monocular.inactive_geo_densify_max_pixel_dist: 1.0
Stereo.min_disparity: 8
Stereo.num_disparity: 128
RGBD.min_depth: 0.0000000001
RGBD.max_depth: 40.0

Mapper.inactive_geo_densify: 1
Mapper.depth_cache: 10
Mapper.min_num_initial_map_kfs: 3
Mapper.new_keyframe_times_of_use: 3
Mapper.local_BA_increased_times_of_use: 0
Mapper.loop_closure_increased_times_of_use_: 2
Mapper.cull_keyframes: 0
Mapper.large_rotation_threshold: 20.0
Mapper.large_translation_threshold: 0.5
Mapper.stable_num_iter_existence: 1
Mapper.lambda_sparse_depth: 500.0

# Use dense RGB-D depth for pruning once the map exists to cut sheet-like floaters.
Mapper.enable_depth_evidence_pruning: 1
Mapper.depth_evidence_prune_start_iter: 300
Mapper.depth_evidence_prune_interval: 100
Mapper.depth_evidence_min_age: 150
Mapper.depth_evidence_min_support_hits: 1
Mapper.depth_evidence_min_free_space_hits: 4
Mapper.depth_evidence_support_margin: 0.08
Mapper.depth_evidence_free_space_margin: 0.08

GausPyramid.do: 0
GausPyramid.num_sub_levels: 3
GausPyramid.sub_level_times_of_use: 8

Pipeline.convert_SHs: 0
Pipeline.compute_cov3D: 0
Pipeline.depth_ratio: 0.0

Record.keyframe_record_interval: 0
Record.all_keyframes_record_interval: 0
Record.record_rendered_image: 1
Record.record_ground_truth_image: 1
Record.record_loss_image: 0
Record.record_depth_image: 1
Record.training_report_interval: 0
Record.record_loop_ply: 0

#--------------------------------------------------------------------------------------------
# Optimization Parameters
#--------------------------------------------------------------------------------------------

Optimization.max_num_iterations: 30100
Optimization.position_lr_init: 0.00016
Optimization.position_lr_final: 0.00016
Optimization.position_lr_delay_mult: 0.01
Optimization.position_lr_max_steps: 24
Optimization.feature_lr: 0.0025
Optimization.opacity_lr: 0.05
Optimization.scaling_lr: 0.005
Optimization.rotation_lr: 0.001

Optimization.percent_dense: 0.01
Optimization.lambda_dssim: 0.2
Optimization.densification_interval: 100
Optimization.opacity_reset_interval: 0
Optimization.prune_big_point_after_iter: 30000
Optimization.densify_min_opacity: 0.005
Optimization.densify_from_iter: 600
Optimization.densify_until_iter: 30000
Optimization.densify_grad_threshold: 0.001
Optimization.max_gaussian_anisotropy_ratio: 3.0
Optimization.max_gaussian_scale_fraction: 0.015

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------

GaussianViewer.glfw_window_width: 1200
GaussianViewer.glfw_window_height: 680
GaussianViewer.image_scale: 0.5
GaussianViewer.image_scale_main: 1.0
GaussianViewer.camera_watch_dist: 0.000001
